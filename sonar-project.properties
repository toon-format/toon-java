sonar.projectKey=toon-format_toon-java
sonar.organization=toon-format
sonar.host.url=https://sonarcloud.io

sonar.projectName=JToon
sonar.projectDescription=Token-Oriented Object Notation (TOON) - A compact, human-readable format for LLM contexts
sonar.sourceEncoding=UTF-8

sonar.java.source=17
sonar.java.target=17
sonar.sources=src/main
sonar.tests=src/test
sonar.java.binaries=build/classes/java/main

# Exclusions
sonar.exclusions=**/package-info.java

# JaCoCo Coverage
sonar.coverage.jacoco.xmlReportPaths=build/customJacocoReportDir/test/jacocoTestReport.xml

sonar.java.spotbugs.reportPaths=build/spotbugs/spotbugs-main.xml
sonar.java.pmd.reportPaths=build/reports/pmd/main.xml
sonar.java.checkstyle.reportPaths=build/reports/checkstyle/main.xml
